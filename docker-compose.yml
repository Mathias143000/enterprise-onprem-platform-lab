services:
  git-daemon:
    build:
      context: ./git-daemon
    container_name: enterprise-lab-git-daemon
    ports:
      - "18018:80"
    volumes:
      - ./artifacts/git:/git

  vault:
    image: hashicorp/vault:1.17
    container_name: enterprise-lab-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev -dev-root-token-id=root-token -dev-listen-address=0.0.0.0:8200
    ports:
      - "18200:8200"
