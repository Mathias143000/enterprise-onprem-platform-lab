apiVersion: v1
kind: Service
metadata:
  name: {{ include "webhook-ingestion-service.fullname" . }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "80"
spec:
  selector:
    app.kubernetes.io/name: {{ include "webhook-ingestion-service.fullname" . }}
  ports:
    - name: http
      port: 80
      targetPort: http
