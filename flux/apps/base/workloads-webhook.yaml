apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: webhook-ingestion-service
  namespace: webhook
spec:
  interval: 5m0s
  timeout: 10m0s
  chart:
    spec:
      chart: ./helm/apps/webhook-ingestion-service
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: platform-repo
        namespace: flux-system
  values:
    image:
      repository: k8s-lab/webhook-ingestion-service
      tag: "2.0.0"
    secrets:
      create: false
      existingSecretName: webhook-ingestion-secrets
    tracing:
      enabled: true
      serviceName: webhook-ingestion-service
      otlpEndpoint: http://jaeger-collector.observability.svc.cluster.local:4318
    ingress:
      enabled: true
      className: traefik
      host: webhook.platform.lab
