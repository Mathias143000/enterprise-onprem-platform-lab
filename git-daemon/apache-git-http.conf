<VirtualHost *:80>
    ServerName localhost
    SetEnv GIT_PROJECT_ROOT /git
    SetEnv GIT_HTTP_EXPORT_ALL 1

    ScriptAliasMatch "(?x)^/git/(.*/(HEAD|info/refs|objects/info/[^/]+|objects/[0-9a-f]{2}/[0-9a-f]{38}|objects/pack/pack-[0-9a-f]{40}\\.(pack|idx)|git-upload-pack|git-receive-pack))$" /usr/lib/git-core/git-http-backend/$1

    <Directory "/usr/lib/git-core">
        Options +ExecCGI -MultiViews +SymLinksIfOwnerMatch
        Require all granted
    </Directory>
</VirtualHost>
